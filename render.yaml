databases:
  - name: receptlightv1-db
    databaseName: receptlight
    user: receptlight
    region: frankfurt
    plan: free

services:
  - type: web
    name: receptlightv1
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run render:predeploy
    startCommand: npm run start
    healthCheckPath: /login
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: DATABASE_URL
        fromDatabase:
          name: receptlightv1-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: receptlightv1-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: UNSTRUCTURED_API_URL
        value: https://api.unstructured.io/general/v0/general
      - key: UNSTRUCTURED_API_KEY
        sync: false
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_ADMIN_NAME
        value: Admin User
      - key: SEED_DEMO_DATA
        value: "false"
